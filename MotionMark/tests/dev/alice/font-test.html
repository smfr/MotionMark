<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <link rel="stylesheet" type="text/css" href="../../resources/stage.css">
    <style>

        @font-face {
            font-family: "OstrichSans";
            src: url("resources/fonts/OstrichSans/OstrichSans-Light.otf") format("opentype");
            font-weight: 200;
            font-style: normal;
        }

        @font-face {
            font-family: "OstrichSans";
            src: url("resources/fonts/OstrichSans/OstrichSans-Medium.otf") format("opentype");
            font-weight: normal;
            font-style: normal;
        }

        @font-face {
            font-family: "OstrichSans";
            src: url("resources/fonts/OstrichSans/OstrichSans-Bold.otf") format("opentype");
            font-weight: bold;
            font-style: normal;
        }

        @font-face {
            font-family: "OstrichSans";
            src: url("resources/fonts/OstrichSans/OstrichSans-Black.otf") format("opentype");
            font-weight: 800;
            font-style: normal;
        }


        @font-face {
            font-family: "OstrichSansRounded";
            src: url("resources/fonts/OstrichSans/OstrichSansRounded-Medium.otf") format("opentype");
            font-weight: normal;
            font-style: normal;
        }

        @font-face {
            font-family: "OstrichSansRounded";
            src: url("resources/fonts/OstrichSans/OstrichSans-Heavy.otf") format("opentype");
            font-weight: 800;
            font-style: normal;
        }
        
        @font-face {
            font-family: "League Spartan";
            src: url("resources/fonts/League Spartan/LeagueSpartan-VF.woff2") format("woff2");
        }

        @font-face {
            font-family: "League Spartan Medium";
            src: url("resources/fonts/League Spartan/LeagueSpartan-Medium.woff2") format("woff2");
            font-weight: normal;
            font-style: normal;
        }


        @font-face {
            font-family: "Linden Hill";
            src: url("resources/fonts/Linden Hill/LindenHill.woff") format("woff2");
            font-style: normal;
        }

        @font-face {
            font-family: "Linden Hill";
            src: url("resources/fonts/Linden Hill/LindenHillItalic.woff") format("woff2");
            font-style: italic;
        }


        div {
            margin: 20px;
            font-size: 24pt;
            font-family: "Linden Hill";
            
            text-rendering: optimizeLegibility;
        }
        
        div.rounded {
            font-family: "OstrichSansRounded";
        }
        
    </style>
</head>
<body>

<div style="font-weight: 100">Linden Hill 100</div>
<div style="font-weight: 200">Linden Hill 200</div>
<div style="font-weight: 300">Linden Hill 300</div>
<div style="font-weight: 400">Linden Hill 400</div>
<div style="font-weight: 500">Linden Hill 500</div>
<div style="font-weight: 600">Linden Hill 600</div>
<div style="font-weight: 700">Linden Hill 700</div>
<div style="font-weight: 800">Linden Hill 800</div>
<div style="font-weight: 900">Linden Hill 900</div>

</body>
</html>
